# Configuration for GDB thread awareness testing
# These options are required for the zephyr_gdb scripts to work

# Thread monitoring is required to discover threads
CONFIG_THREAD_MONITOR=y

# Thread names make debugging easier
CONFIG_THREAD_NAME=y

# Debug build (not optimization)
CONFIG_DEBUG=y

# Enable debug optimizations
CONFIG_DEBUG_OPTIMIZATIONS=y

# No compiler optimizations for better debugging
CONFIG_NO_OPTIMIZATIONS=y

# Enable GDB thread info symbol export for V2 (symbol-based discovery)
# This exports _kernel_thread_info_offsets and related symbols
CONFIG_DEBUG_THREAD_INFO=y
